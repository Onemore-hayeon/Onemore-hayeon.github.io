# Theme Settings
minimal_mistakes_skin    : "air"

# Site Settings
locale                   : "en"
title                    : "OneMore Blog"
title_separator          : "|"
subtitle                 : "Actions speak louder than words."
name                     : "Hayeon"
description              : "A space to collect knowledge on development & security IT."
url                      : "https://onemore-hayeon.github.io"
baseurl                  : ""
repository               : "onemore-hayeon/onemore-hayeon.github.io"
teaser                   :
logo                     :
masthead_title           :
breadcrumbs              : true
words_per_minute         : 200
comments:
  provider               : false
  disqus:
    shortname            : "OneMore-hayeon"
search                   : true
search_full_content      : true
search_provider          : lunr

# SEO Related
google_site_verification : N7v_l9HM7DrPmEbXcne8RVMkaN3kSvLDKztQUMFW3JA
bing_site_verification   :
naver_site_verification  :

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "Hayeon"
  avatar           : "/assets/images/bio-photo.png"
  bio              : "One more thing learned every day.
Dev & Security IT notes."
  location         : "South Korea"
  email            : "hayeon.hjn@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/onemore-hayeon"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/onemore-hayeon"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "

"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Seoul

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
  exclude:
    - sitemap.xml

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
