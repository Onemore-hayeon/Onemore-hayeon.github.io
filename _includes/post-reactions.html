<section class="post-reactions" aria-label="Post reactions">
  <p class="post-reactions__label">How was this post?</p>
  <div class="post-reactions__buttons" role="group">
    <button class="reaction-btn" data-key="thumbsup"  data-emoji="&#128077;" aria-label="Good"       title="Good">
      <span class="reaction-emoji">&#128077;</span>
      <span class="reaction-text">Good</span>
      <span class="reaction-count">—</span>
    </button>
    <button class="reaction-btn" data-key="fire"      data-emoji="&#128293;" aria-label="Hot"        title="Hot">
      <span class="reaction-emoji">&#128293;</span>
      <span class="reaction-text">Hot</span>
      <span class="reaction-count">—</span>
    </button>
    <button class="reaction-btn" data-key="bulb"      data-emoji="&#128161;" aria-label="Insightful" title="Insightful">
      <span class="reaction-emoji">&#128161;</span>
      <span class="reaction-text">Insightful</span>
      <span class="reaction-count">—</span>
    </button>
    <button class="reaction-btn" data-key="heart"     data-emoji="&#10084;" aria-label="Love"       title="Love">
      <span class="reaction-emoji">&#10084;</span>
      <span class="reaction-text">Love</span>
      <span class="reaction-count">—</span>
    </button>
    <button class="reaction-btn" data-key="tada"      data-emoji="&#127881;" aria-label="Nice!"      title="Nice!">
      <span class="reaction-emoji">&#127881;</span>
      <span class="reaction-text">Nice!</span>
      <span class="reaction-count">—</span>
    </button>
  </div>
</section>

<script>
(function () {
  /* Safe Firebase key from page URL (no slashes/dots) */
  var postKey      = {{ page.url | jsonify }}.replace(/[\.#$\[\]/]/g, '_');
  var localKey     = 'om_react__' + postKey;
  var dbRef        = firebase.database().ref('reactions/' + postKey);
  var buttons      = document.querySelectorAll('.reaction-btn');

  /* localStorage: { thumbsup: true, fire: true, ... } */
  function loadLocal() {
    try { return JSON.parse(localStorage.getItem(localKey)) || {}; }
    catch (e) { return {}; }
  }
  function saveLocal(data) {
    try { localStorage.setItem(localKey, JSON.stringify(data)); } catch (e) {}
  }

  /* Update count display on a button */
  function setCount(btn, n) {
    btn.querySelector('.reaction-count').textContent = n > 0 ? n : '0';
  }

  /* Listen for real-time count updates from Firebase */
  dbRef.on('value', function (snap) {
    var counts = snap.val() || {};
    buttons.forEach(function (btn) {
      setCount(btn, counts[btn.dataset.key] || 0);
    });
  });

  /* Restore local user state */
  var userState = loadLocal();
  buttons.forEach(function (btn) {
    if (userState[btn.dataset.key]) {
      btn.classList.add('reaction-btn--active');
      btn.setAttribute('aria-pressed', 'true');
    } else {
      btn.setAttribute('aria-pressed', 'false');
    }
  });

  /* Click handler: toggle + Firebase transaction */
  buttons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var key     = btn.dataset.key;
      var state   = loadLocal();
      var isActive = !!state[key];
      var delta   = isActive ? -1 : 1;

      /* Optimistic UI */
      if (isActive) {
        btn.classList.remove('reaction-btn--active');
        btn.setAttribute('aria-pressed', 'false');
        delete state[key];
      } else {
        btn.classList.add('reaction-btn--active');
        btn.setAttribute('aria-pressed', 'true');
        state[key] = true;

        btn.classList.add('reaction-btn--pop');
        btn.addEventListener('animationend', function () {
          btn.classList.remove('reaction-btn--pop');
        }, { once: true });
      }
      saveLocal(state);

      /* Atomic increment/decrement in Firebase */
      dbRef.child(key).transaction(function (current) {
        return Math.max(0, (current || 0) + delta);
      });
    });
  });
}());
</script>
